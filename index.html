<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Spec Analyzer - PSAJ Informatika</title>
    <!-- Library untuk Grafik & Popup -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ff88; --accent: #6366f1; --bg: #0f172a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        h1 { text-align: center; font-weight: 800; background: linear-gradient(to right, var(--primary), #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .info-box { background: #1e293b; padding: 15px; border-radius: 15px; margin: 15px 0; border-left: 4px solid var(--primary); }
        .btn-run { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-run:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        #gameResult { margin-top: 20px; display: none; padding: 15px; background: #334155; border-radius: 15px; }
        .tag { display: inline-block; background: #064e3b; color: #34d399; padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; margin: 5px; }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>Spec Analyzer 2.0</h1>
    <p style="text-align: center; font-size: 0.9rem; opacity: 0.8;">Ujian Praktek Informatika - PSAJ 2026</p>

    <div class="info-box">
        <div id="cpuText">CPU: Menunggu Analisis...</div>
        <div id="ramText">RAM: Menunggu Analisis...</div>
    </div>

    <canvas id="myChart" style="margin-bottom: 20px;"></canvas>

    <button class="btn-run" onclick="startProcess()">SCAN PERFORMA SISTEM</button>

    <div id="gameResult">
        <h4 style="margin: 0 0 10px 0;">🎮 Game Yang Cocok:</h4>
        <div id="gameList"></div>
    </div>
</div>

<script>
    let chart;
    function startProcess() {
        Swal.fire({
            title: 'Memulai Pindaian...',
            text: 'Mengambil data hardware via Browser API',
            timer: 1500,
            showConfirmButton: false,
            didOpen: () => { Swal.showLoading() }
        }).then(() => { runDetection(); });
    }

    function runDetection() {
        const cpu = navigator.hardwareConcurrency || 4;
        const ram = navigator.deviceMemory || 4;
        
        document.getElementById('cpuText').innerText = `Prosesor: ${cpu} Threads Terdeteksi`;
        document.getElementById('ramText').innerText = `Memori: ~${ram} GB RAM`;

        // Update Chart
        const ctx = document.getElementById('myChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['CPU Power', 'RAM Capacity'],
                datasets: [{
                    data: [cpu * 10, ram * 10],
                    backgroundColor: ['#6366f1', '#00ff88'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } } }
        });

        // Rekomendasi Game
        const list = document.getElementById('gameList');
        const res = document.getElementById('gameResult');
        res.style.display = 'block';
        list.innerHTML = "";
        
        let games = ram >= 8 ? 
            [{n:"Valorant", g:"High"}, {n:"GTA V", g:"Ultra"}, {n:"Forza 5", g:"Med"}] : 
            [{n:"Roblox", g:"Max"}, {n:"Minecraft", g:"Fancy"}, {n:"Stardew", g:"Max"}];

        games.forEach(g => {
            list.innerHTML += `<span class="tag">${g.n} (${g.g})</span>`;
        });
    }
</script>
</body>
</html>
