<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Pro Dashboard</title>
    <style>
        /* CSS: Efek Modern & Responsif */
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            padding: 30px; border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            width: 100%; max-width: 450px; border: 1px solid white;
        }

        h2 { color: #1e293b; margin-top: 0; font-weight: 800; text-align: center; letter-spacing: -1px; }
        
        .timer-box { background: #1e293b; color: #fbbf24; padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 25px; }
        #timer { font-size: 3.5rem; font-weight: 900; font-family: monospace; }
        
        .btn { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; width: 100%; }
        .btn-main { background: var(--primary); color: white; margin-top: 10px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }

        .input-area { display: flex; gap: 8px; margin-top: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }

        ul { padding: 0; margin-top: 20px; }
        li { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9; transition: 0.2s; }
        li:hover { transform: scale(1.02); }
        .delete-btn { color: #ef4444; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>🚀 Study Flow</h2>
    
    <div class="timer-box">
        <div id="timer">25:00</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">FOKUS MODE</div>
    </div>
    
    <button class="btn btn-main" onclick="startTimer()">Mulai Sesi Belajar</button>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Apa fokusmu hari ini?">
        <button class="btn btn-main" style="width: auto; margin:0;" onclick="addTask()">+</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    // JS: Logika Interaktif
    function addTask() {
        const input = document.getElementById("taskInput");
        if (input.value === "") return;
        
        const li = document.createElement("li");
        li.innerHTML = `<span>${input.value}</span> <span class="delete-btn" onclick="this.parentElement.remove()">✕</span>`;
        document.getElementById("taskList").appendChild(li);
        input.value = "";
    }

    function startTimer() {
        let timeLeft = 25 * 60;
        const display = document.getElementById("timer");
        const btn = document.querySelector(".btn-main");
        btn.disabled = true;
        btn.style.opacity = "0.5";
        
        const countdown = setInterval(() => {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            display.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert("Waktu habis! Kerja bagus!");
                btn.disabled = false;
                btn.style.opacity = "1";
            }
            timeLeft--;
        }, 1000);
    }
</script>

</body>
</html>
